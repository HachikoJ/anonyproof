# Nginx 安全加固配置
# 全局安全设置

# 隐藏 Nginx 版本号
server_tokens off;

# 限制请求速率
limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# 限制请求大小
client_max_body_size 10M;
client_body_buffer_size 128K;
client_header_buffer_size 1k;
large_client_header_buffers 4 4k;

# 超时设置
client_body_timeout 12;
client_header_timeout 12;
keepalive_timeout 15;
send_timeout 10;

# 缓冲区限制
client_body_buffer_size 128K;
client_max_body_size 10m;
client_header_buffer_size 1k;
large_client_header_buffers 4 4k;

# 安全头部
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# 禁止不安全的 HTTP 方法
if ($request_method !~ ^(GET|HEAD|POST)$ ) {
    return 405;
}

# 防止目录遍历
location ~* \.(htaccess|htpasswd|ini|log|sh|inc|bak|sql|conf)$ {
    deny all;
}

# 限制访问隐藏文件
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# 限制访问备份文件
location ~* \.(bak|backup|old|orig|save|tmp)$ {
    deny all;
}

# 安全：禁止访问 git/svn 目录
location ~ /\.(git|svn|hg) {
    deny all;
    access_log off;
    log_not_found off;
}

# 限制并发连接
limit_conn addr 10;

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript application/xml;
gzip_disable "msie6";

# 静态资源缓存规则已禁用 - 会干扰Next.js等前端框架的动态路由
# 如需启用，请在具体server块中配置
