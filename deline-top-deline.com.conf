# 主域名配置 - 费曼 + 培训 + 匿证（修复版）
server {
    listen 80;
    listen [::]:80;
    server_name deline.top www.deline.com;
    
    # 根目录指向匿证项目
    root /root/.openclaw/workspace/anonyproof/.next;

    # 匿证项目（静态，根路径）
    location / {
        try_files $uri $uri/index.html $uri.html $uri/ /index.html;
    }

    # 费曼读书法项目（反向代理）
    location /feynman {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 培训项目（静态）
    location /training {
        alias /usr/share/nginx/html/training;
        index index.html;
        try_files $uri $uri/ /training/index.html;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|eot|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问敏感文件
    location ~* \.(env|git|svn|htaccess|htpasswd|log|bak|backup|sql|conf|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
