server {
    listen 80;
    listen [::]:80;
    server_name deline.top www.deline.top;
    root /root/.openclaw/workspace/anonyproof/.next;

    # 匿证项目
    location /anonyproof {
        alias /root/.openclaw/workspace/anonyproof/.next;
        index index.html;
        try_files $uri $uri/ /anonyproof/index.html;
    }

    # 费曼读书项目
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # 培训项目
    location /training {
        alias /usr/share/nginx/html/training;
        index index.html;
        try_files $uri $uri/ /training/index.html;
    }

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|eot|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
