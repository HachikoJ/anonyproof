# 主域名配置 - 费曼读书 + 培训 + 匿证项目
server {
    listen 80;
    listen [::]:80;
    server_name deline.top www.deline.top;

    # 费曼读书法项目（反向代理）
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # 匿证项目（静态文件）
    location /anonyproof {
        alias /root/.openclaw/workspace/anonyproof/.next;
        index index.html;
        try_files $uri $uri/ /anonyproof/index.html;

        # 静态资源缓存
        location ~* /anonyproof.*\.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|eot|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 培训项目路径（静态文件）
    location /training {
        alias /usr/share/nginx/html/training;
        index index.html;
        try_files $uri $uri/ /training/index.html;

        # 静态资源缓存
        location ~* /training.*\.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|eot|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 禁止访问敏感文件
    location ~* \.(env|git|svn|htaccess|htpasswd|log|bak|backup|sql|conf|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
